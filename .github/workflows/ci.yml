name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

jobs:
  offline-verification:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Pi 0.80.6
        run: npm install -g @earendil-works/pi-coding-agent@0.80.6

      - name: Run deterministic offline tests
        run: npm run test:offline

      - name: Run typecheck
        run: npm run typecheck

      - name: Run release smoke checks
        run: npm run smoke

  live-pricing-observation:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pin Pi 0.80.6
        run: npm install -g @earendil-works/pi-coding-agent@0.80.6

      - name: Observe current OpenRouter catalog
        run: npm run test:live
